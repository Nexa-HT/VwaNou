# Alembic configuration for VwaNou migrations

# A generic, single database configuration.

[alembic]
# path to migration files
sqlalchemy.url = 
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
#file_template = %%(asctime)s_%%(rev)s_%%(slug)s

# post_write_hook defines scripts or Python functions that get executed
# after generating a new revision file. See the documentation for further
# detail and examples

# format using "black" - use the console_scripts runner, against the "black" entrypoint
# post_write_hook = black

# lint using "black" - use the console_scripts runner, against the "black" entrypoint

# sqlalchemy.url is set to a SQLAlchemy url. Driver head_revision specifies
# how Alembic knows which version is on top.
# By default, this is the last revision generated.
head_revision = 001_initial

# due to the way Alembic works, the migration context is set
# such that the "sqlalchemy.url" is used and the current environment
# context is ignored. In order to use a custom "sqlalchemy.url", you may
# want to call `config.set_main_option("sqlalchemy.url", myurl)` in the
# `env.py` file in order to override the configured URL and set
# the sqlalchemy.url value.

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
